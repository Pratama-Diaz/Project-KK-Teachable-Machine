<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess Vision</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f5f0e8;
    color: #1a1108;
    font-family: Georgia, serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 48px;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }
  header h1 {
    font-size: 2rem;
    font-weight: bold;
    letter-spacing: 0.06em;
    color: #1a1108;
  }
  header p {
    color: #7a6040;
    font-style: italic;
    font-size: 0.9rem;
    margin-top: 4px;
  }
  .hr { width: 120px; height: 1px; background: #c9a84c; margin: 12px auto 0; }

  .container { width: 100%; max-width: 520px; }

  /* TABS */
  .tabs {
    display: flex;
    border-bottom: 2px solid #d6c9a8;
    margin-bottom: 24px;
    gap: 0;
  }
  .tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    cursor: pointer;
    font-size: 0.85rem;
    color: #7a6040;
    border: none;
    background: none;
    font-family: Georgia, serif;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: all 0.2s;
  }
  .tab.active {
    color: #1a1108;
    border-bottom-color: #c9a84c;
    font-weight: bold;
  }

  /* SCREENS */
  .screen { display: none; }
  .screen.active { display: block; }

  /* WEBCAM */
  #webcam-wrap {
    background: #1a1108;
    border-radius: 6px;
    overflow: hidden;
    min-height: 240px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  #webcam-wrap canvas { width: 100% !important; height: auto !important; display: block; }
  .cam-placeholder {
    text-align: center;
    color: #7a6040;
    font-size: 0.8rem;
    padding: 40px 20px;
  }
  .cam-placeholder .icon { font-size: 2.5rem; display: block; margin-bottom: 8px; }

  /* Camera switch button */
  #btn-flip {
    position: absolute;
    top: 10px; right: 10px;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    font-size: 1.2rem;
    width: 38px; height: 38px;
    border-radius: 50%;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  #btn-flip.visible { display: flex; }

  .btn-row { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }

  .btn {
    flex: 1;
    padding: 10px 16px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-family: Georgia, serif;
    font-size: 0.82rem;
    font-weight: bold;
    letter-spacing: 0.04em;
    transition: all 0.18s;
    min-width: 100px;
  }
  .btn-primary { background: #c9a84c; color: #1a1108; }
  .btn-primary:hover { background: #e0bc60; }
  .btn-secondary { background: transparent; border: 1px solid #d6c9a8; color: #7a6040; }
  .btn-secondary:hover { border-color: #c9a84c; color: #1a1108; }

  /* UPLOAD */
  .drop-zone {
    border: 2px dashed #d6c9a8;
    border-radius: 6px;
    padding: 36px 16px;
    text-align: center;
    cursor: pointer;
    position: relative;
    background: rgba(255,255,255,0.4);
    transition: all 0.2s;
  }
  .drop-zone:hover, .drop-zone.drag-over { border-color: #c9a84c; background: rgba(201,168,76,0.06); }
  .drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .drop-zone .icon { font-size: 2rem; display: block; margin-bottom: 8px; }
  .drop-zone p { color: #7a6040; font-size: 0.8rem; line-height: 1.6; }
  .drop-zone p span { color: #c9a84c; }

  #preview-wrap { display: none; margin-top: 12px; }
  #preview-wrap img {
    width: 100%;
    border-radius: 4px;
    max-height: 360px;
    object-fit: contain;
    background: #1a1108;
    border: 1px solid #d6c9a8;
  }
  .small-link {
    background: none; border: none; font-family: Georgia, serif;
    font-size: 0.72rem; color: #7a6040; cursor: pointer;
    margin-top: 6px; display: inline-block; text-decoration: underline;
  }

  /* RESULTS */
  .results {
    margin-top: 24px;
    border-top: 1px solid #d6c9a8;
    padding-top: 18px;
  }
  .results-title {
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #7a6040;
    margin-bottom: 14px;
  }
  .placeholder-text {
    color: #b0a080;
    font-style: italic;
    font-size: 0.82rem;
    text-align: center;
    padding: 12px 0;
  }

  .result-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .result-name { flex: 0 0 120px; font-size: 0.78rem; color: #1a1108; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bar-track { flex: 1; height: 5px; background: #e0d9c8; border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; background: #c9a84c; transition: width 0.4s ease; width: 0%; }
  .result-pct { font-size: 0.75rem; color: #c9a84c; font-weight: bold; width: 44px; text-align: right; }

  /* STATUS */
  .status {
    display: flex; align-items: center; gap: 7px;
    margin-top: 14px; padding-top: 12px;
    border-top: 1px solid #e8dfc8;
    font-size: 0.68rem; color: #b0a080;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #d6c9a8; }
  .dot.on { background: #c9a84c; }

  /* Spinner */
  .spinner {
    display: none; width: 20px; height: 20px;
    border: 2px solid #d6c9a8; border-top-color: #c9a84c;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    margin: 0 auto 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>♛ Chess Vision</h1>
  <p>Image Classification Engine</p>
  <div class="hr"></div>
</header>

<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('webcam')">📷 Webcam</button>
    <button class="tab" onclick="switchTab('upload')">🖼️ Upload</button>
  </div>

  <!-- WEBCAM -->
  <div class="screen active" id="screen-webcam">
    <div id="webcam-wrap">
      <div class="cam-placeholder" id="cam-placeholder">
        <span class="icon">♞</span>
        Webcam belum aktif
      </div>
      <button id="btn-flip" title="Ganti kamera" onclick="flipCamera()">🔄</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="initWebcam()">▶ Mulai Webcam</button>
      <button class="btn btn-secondary" onclick="stopWebcam()">■ Stop</button>
    </div>
    <div class="results">
      <div class="results-title">Hasil Prediksi</div>
      <div class="spinner" id="spinner-wc"></div>
      <div id="labels-wc"><p class="placeholder-text">Belum ada prediksi</p></div>
      <div class="status">
        <div class="dot" id="dot-wc"></div>
        <span id="status-wc">Model belum dimuat</span>
      </div>
    </div>
  </div>

  <!-- UPLOAD -->
  <div class="screen" id="screen-upload">
    <div class="drop-zone" id="dropZone">
      <input type="file" accept="image/*" id="imageUpload" onchange="handleUpload(event)">
      <span class="icon">♞</span>
      <p>Drag & drop gambar di sini<br>atau <span>klik untuk memilih file</span></p>
    </div>
    <div id="preview-wrap">
      <img id="preview-img" src="" alt="Preview">
      <br>
      <button class="small-link" onclick="clearUpload()">✕ Hapus gambar</button>
      <div class="btn-row" style="margin-top:10px;">
        <button class="btn btn-primary" onclick="predictUpload()">♛ Identifikasi Gambar</button>
      </div>
    </div>
    <div class="results">
      <div class="results-title">Hasil Prediksi</div>
      <div class="spinner" id="spinner-up"></div>
      <div id="labels-up"><p class="placeholder-text">Belum ada prediksi</p></div>
      <div class="status">
        <div class="dot" id="dot-up"></div>
        <span id="status-up">Model belum dimuat</span>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script>
  const MODEL_URL = "./tm-my-image-model/";
  let model, maxPredictions;
  let webcam, webcamRunning = false, animFrame;
  let currentFacing = 'user'; // 'user' = depan, 'environment' = belakang (HP)

  // ---- TABS ----
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0) === (tab==='webcam')));
    document.getElementById('screen-webcam').classList.toggle('active', tab==='webcam');
    document.getElementById('screen-upload').classList.toggle('active', tab==='upload');
    if (tab !== 'webcam') stopWebcam();
  }

  // ---- MODEL ----
  async function loadModel() {
    if (model) return;
    setStatus('wc','Memuat model…',false);
    setStatus('up','Memuat model…',false);
    model = await tmImage.load(MODEL_URL+"model.json", MODEL_URL+"metadata.json");
    maxPredictions = model.getTotalClasses();
    setStatus('wc','Model siap',true);
    setStatus('up','Model siap',true);
  }

  function setStatus(ctx, msg, on) {
    document.getElementById('status-'+ctx).textContent = msg;
    document.getElementById('dot-'+ctx).className = 'dot'+(on?' on':'');
  }

  // ---- WEBCAM ----
  async function initWebcam() {
    await loadModel();
    if (webcamRunning) stopWebcam();
    setStatus('wc','Memulai kamera…',false);
    try {
      // Coba akses kamera dengan facingMode sesuai pilihan
      const constraints = { video: { facingMode: currentFacing }, audio: false };
      const stream = await navigator.mediaDevices.getUserMedia(constraints);
      stream.getTracks().forEach(t => t.stop()); // hanya test akses, Teachable Machine akan buka sendiri
    } catch(e) {
      alert('Tidak bisa mengakses kamera: ' + e.message);
      setStatus('wc','Gagal akses kamera',false);
      return;
    }

    webcam = new tmImage.Webcam(360, 360, currentFacing === 'user');
    try {
      await webcam.setup({ facingMode: currentFacing });
    } catch(e) {
      // fallback tanpa facingMode
      await webcam.setup();
    }
    await webcam.play();
    webcamRunning = true;

    const wrap = document.getElementById('webcam-wrap');
    document.getElementById('cam-placeholder').style.display = 'none';
    // hapus canvas lama jika ada
    const oldCanvas = wrap.querySelector('canvas');
    if (oldCanvas) oldCanvas.remove();
    wrap.insertBefore(webcam.canvas, document.getElementById('btn-flip'));
    document.getElementById('btn-flip').classList.add('visible');
    setStatus('wc','Kamera aktif',true);
    loopWebcam();
  }

  async function loopWebcam() {
    if (!webcamRunning) return;
    webcam.update();
    await predict(webcam.canvas, 'wc');
    animFrame = requestAnimationFrame(loopWebcam);
  }

  function stopWebcam() {
    if (!webcamRunning) return;
    webcamRunning = false;
    cancelAnimationFrame(animFrame);
    try { webcam.stop(); } catch(e){}
    document.getElementById('cam-placeholder').style.display = 'block';
    document.getElementById('cam-placeholder').innerHTML = '<span class="icon">♞</span>Webcam dihentikan';
    const wrap = document.getElementById('webcam-wrap');
    const cv = wrap.querySelector('canvas');
    if (cv) cv.remove();
    document.getElementById('btn-flip').classList.remove('visible');
    setStatus('wc','Kamera dihentikan',false);
  }

  async function flipCamera() {
    currentFacing = currentFacing === 'user' ? 'environment' : 'user';
    if (webcamRunning) await initWebcam();
  }

  // ---- UPLOAD ----
  const dropZone = document.getElementById('dropZone');
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('image/')) handleUpload({ target: { files: e.dataTransfer.files } });
  });

  function handleUpload(e) {
    const f = e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = ev => {
      document.getElementById('preview-img').src = ev.target.result;
      document.getElementById('preview-wrap').style.display = 'block';
      dropZone.style.display = 'none';
    };
    reader.readAsDataURL(f);
  }

  async function predictUpload() {
    await loadModel();
    const img = document.getElementById('preview-img');
    if (!img.src) return;
    document.getElementById('spinner-up').style.display = 'block';
    document.getElementById('labels-up').innerHTML = '';
    setStatus('up','Menganalisis…',true);
    await new Promise(r => setTimeout(r, 80));

    const canvas = document.createElement('canvas');
    canvas.width = 224; canvas.height = 224;
    const ctx = canvas.getContext('2d');
    const size = Math.min(img.naturalWidth, img.naturalHeight);
    const sx = (img.naturalWidth - size) / 2;
    const sy = (img.naturalHeight - size) / 2;
    ctx.drawImage(img, sx, sy, size, size, 0, 0, 224, 224);

    await predict(canvas, 'up');
    document.getElementById('spinner-up').style.display = 'none';
    setStatus('up','Prediksi selesai',true);
  }

  function clearUpload() {
    document.getElementById('preview-img').src = '';
    document.getElementById('preview-wrap').style.display = 'none';
    document.getElementById('imageUpload').value = '';
    dropZone.style.display = '';
    document.getElementById('labels-up').innerHTML = "<p class='placeholder-text'>Belum ada prediksi</p>";
    setStatus('up', model ? 'Model siap' : 'Model belum dimuat', !!model);
  }

  // ---- PREDICT ----
  async function predict(source, ctx) {
    const preds = await model.predict(source);
    preds.sort((a,b) => b.probability - a.probability);
    const container = document.getElementById('labels-'+ctx);
    container.innerHTML = '';
    preds.forEach(p => {
      const pct = (p.probability * 100).toFixed(1);
      const row = document.createElement('div');
      row.className = 'result-row';
      row.innerHTML = `
        <span class="result-name">${p.className}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
        <span class="result-pct">${pct}%</span>`;
      container.appendChild(row);
    });
  }
</script>
</body>
</html>
